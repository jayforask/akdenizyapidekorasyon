<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifre Değiştir | Admin Paneli</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-text">AKDENİZ YAPI</span><span class="logo-sub">Admin Panel</span></div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/admin/hizmetler.html"><i class="fas fa-tools"></i> Hizmetler</a>
      <a href="/admin/kategoriler.html"><i class="fas fa-tags"></i> Kategoriler</a>
      <a href="/admin/referanslar.html"><i class="fas fa-building"></i> Referanslar</a>
      <a href="/admin/mesajlar.html"><i class="fas fa-envelope"></i> Mesajlar</a>
      <a href="/admin/ayarlar.html"><i class="fas fa-cog"></i> Site Ayarları</a>
      <a href="/admin/sifre.html" class="active"><i class="fas fa-key"></i> Şifre Değiştir</a>
      <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> Siteyi Gör</a>
    </nav>
    <button class="sidebar-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
  </aside>
  <div class="admin-main">
    <header class="admin-header">
      <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <h1 class="admin-page-title">Şifre Değiştir</h1>
      <div class="admin-user"><i class="fas fa-user-circle"></i><span id="adminUsername">admin</span></div>
    </header>
    <div class="admin-content">
      <div class="settings-card" style="max-width:480px">
        <h3 class="settings-card-title"><i class="fas fa-lock"></i> Şifre Güncelle</h3>
        <form id="pwForm" novalidate>
          <div class="form-group">
            <label>Mevcut Şifre <span class="req">*</span></label>
            <div class="input-pw-wrap">
              <input type="password" id="currentPw" required placeholder="Mevcut şifreniz" />
              <button type="button" class="pw-toggle" onclick="togglePw('currentPw', this)"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label>Yeni Şifre <span class="req">*</span></label>
            <div class="input-pw-wrap">
              <input type="password" id="newPw" required placeholder="En az 6 karakter" minlength="6" />
              <button type="button" class="pw-toggle" onclick="togglePw('newPw', this)"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label>Yeni Şifre (Tekrar) <span class="req">*</span></label>
            <div class="input-pw-wrap">
              <input type="password" id="newPw2" required placeholder="Yeni şifreyi tekrar girin" />
              <button type="button" class="pw-toggle" onclick="togglePw('newPw2', this)"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div id="pwAlert" class="alert hidden" style="margin-bottom:1rem;"></div>
          <button type="submit" class="btn-admin btn-primary btn-lg" id="pwBtn">
            <i class="fas fa-save"></i> Şifreyi Güncelle
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await requireAuth()) return;
      document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
    });

    function togglePw(inputId, btn) {
      const inp = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    document.getElementById('pwForm').addEventListener('submit', async e => {
      e.preventDefault();
      const alert = document.getElementById('pwAlert');
      const btn = document.getElementById('pwBtn');
      const current = document.getElementById('currentPw').value;
      const newPw = document.getElementById('newPw').value;
      const newPw2 = document.getElementById('newPw2').value;

      alert.className = 'alert hidden';

      if (newPw.length < 6) {
        alert.textContent = 'Yeni şifre en az 6 karakter olmalı.';
        alert.className = 'alert alert-error'; return;
      }
      if (newPw !== newPw2) {
        alert.textContent = 'Yeni şifreler eşleşmiyor.';
        alert.className = 'alert alert-error'; return;
      }

      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Güncelleniyor...';
      try {
        const res = await fetch(`${API}/auth/change-password`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ currentPassword: current, newPassword: newPw })
        });
        const data = await res.json();
        if (res.ok) {
          alert.textContent = '✓ Şifre başarıyla güncellendi.';
          alert.className = 'alert alert-success';
          document.getElementById('pwForm').reset();
          toast('Şifre güncellendi.');
        } else {
          alert.textContent = data.error || 'Hata oluştu.';
          alert.className = 'alert alert-error';
        }
      } catch {
        alert.textContent = 'Bağlantı hatası.';
        alert.className = 'alert alert-error';
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Şifreyi Güncelle';
      }
    });
  </script>
</body>
</html>
