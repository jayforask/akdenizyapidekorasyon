<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Girişi | Akdeniz Yapı Dekorasyon</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-text">AKDENİZ YAPI</span>
        <span class="logo-sub">DEKORASYON</span>
        <p class="login-subtitle">Yönetim Paneli</p>
      </div>

      <div id="loginAlert" class="alert hidden"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Kullanıcı Adı</label>
          <input type="text" id="username" name="username" placeholder="Kullanıcı adı" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Şifre</label>
          <div class="input-pw-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Şifreyi göster">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Giriş Yap
        </button>
      </form>

      <p class="login-footer-note">Varsayılan: admin / admin123</p>
    </div>
  </div>

  <script>
    const API = '/api';

    // Token varsa direkt dashboard'a git
    if (localStorage.getItem('admin_token')) {
      fetch(`${API}/auth/verify`, {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('admin_token') }
      }).then(r => {
        if (r.ok) window.location.href = '/admin/dashboard.html';
        else localStorage.removeItem('admin_token');
      }).catch(() => {});
    }

    document.getElementById('pwToggle').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const alert = document.getElementById('loginAlert');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Giriş yapılıyor...';
      alert.className = 'alert hidden';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_username', data.username);
          window.location.href = '/admin/dashboard.html';
        } else {
          alert.textContent = data.error || 'Giriş başarısız.';
          alert.className = 'alert alert-error';
        }
      } catch {
        alert.textContent = 'Sunucuya bağlanılamadı.';
        alert.className = 'alert alert-error';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Giriş Yap';
      }
    });
  </script>
</body>
</html>
